<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CampoAmigo | Café de Origen{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #EAD9C5;
            --accent: #B8804F;
            --primary: #8A5A3C;
            --text-dark: #2C1A12;
            --card-bg: #FDFBF8;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand { 
            font-family: 'Fredoka', sans-serif; 
        }

        .navbar-campo {
            background: rgba(253, 251, 248, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 0;
            box-shadow: 0 4px 30px rgba(138, 90, 60, 0.08);
        }

        .navbar-brand { color: var(--primary) !important; font-weight: 600; }
        .navbar-brand span { color: var(--accent); }
        
        .nav-link {
            color: var(--text-dark) !important;
            font-size: 0.85rem;
            font-weight: 500;
            margin: 0 1rem;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--accent) !important; }

        .nav-link.active {
            color: var(--accent) !important;
            font-weight: 600;
        }

        .btn-wa-nav {
            background: var(--accent);
            color: white !important;
            border-radius: 50px;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            font-size: 0.8rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
        }
        
        .btn-wa-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(184, 128, 79, 0.3);
            background: var(--primary);
        }

        footer {
            background: var(--primary);
            color: #EAD9C5;
            padding: 4rem 0 2rem;
            margin-top: 6rem;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
        }

        .footer-logo { 
            font-size: 1.5rem; 
            color: var(--bg-base); 
            font-weight: 600; 
            font-family: 'Fredoka', sans-serif; 
        }
        
        .soft-shadow {
            box-shadow: 0 10px 40px rgba(138, 90, 60, 0.08) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-campo sticky-top">
        <div class="container">
            <a class="navbar-brand fs-3" href="/">Campo<span>Amigo</span> <i class="bi bi-cup-hot-fill ms-1"></i></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link" href="/"><i class="bi bi-shop me-1"></i> Marketplace</a>
                    <a class="nav-link" href="/eventos/">
                        <i class="bi bi-calendar-event me-1"></i>Eventos
                    </a>
                    {% comment %} <a class="nav-link" href="/dashboard/">Dashboard</a> {% endcomment %}
                    <a href="https://wa.me/15551586886" target="_blank" class="btn btn-wa-nav ms-lg-3">
                        <i class="bi bi-whatsapp me-1"></i> Abrir Bot
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="row align-items-center gap-4 gap-md-0">
                <div class="col-md-6 text-center text-md-start">
                    <div class="footer-logo mb-2">CampoAmigo <i class="bi bi-cup-hot-fill ms-1"></i></div>
                    <p class="small mb-0" style="opacity: 0.8;">
                        Directo de la Sierra Norte de Puebla.<br>
                        Sin intermediarios, precio justo para el productor.
                    </p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3 mb-2">
                        <a href="/" class="small text-decoration-none" style="opacity: 0.7; color: #EAD9C5;">Marketplace</a>
                        <a href="/eventos/" class="small text-decoration-none" style="opacity: 0.7; color: #EAD9C5;">Eventos</a>
                        
                    </div>
                    <p class="small mb-0 opacity-50">© 2026 CampoAmigo. Café de especialidad Sierra Norte.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
