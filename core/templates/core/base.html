<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CosechaDirecta{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --verde: #2d6a4f;
        --amarillo: #f4a261;
      }
      .navbar {
        background-color: var(--verde) !important;
      }
      .btn-primary {
        background-color: var(--verde);
        border-color: var(--verde);
      }
      .btn-warning {
        background-color: var(--amarillo);
        border-color: var(--amarillo);
      }
      .card:hover {
        transform: translateY(-3px);
        transition: 0.2s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark px-4 py-3">
      <a class="navbar-brand fw-bold fs-4" href="/">🌽 CosechaDirecta</a>
      <div>
        <a href="/" class="text-white me-3">Marketplace</a>
        <a href="/dashboard/" class="text-white">Dashboard</a>
      </div>
    </nav>
    <div class="container py-4">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
